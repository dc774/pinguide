<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Pinguide — AI-powered pinball guide</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    header p {
      margin-top: 1.2rem;
      font-size: 0.875rem;
      color: #999;
      line-height: 1.5em;
    }

    header hr {
      border-color: #555;
      width: 100%;
      margin: 16px 0 0;
    }

    .query-form {
      display: flex;
      gap: 0.5rem;
    }

    .query-form input {
      flex: 1;
      padding: 0.65rem 0.9rem;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .query-form input:focus {
      border-color: #555;
    }

    .query-form input::placeholder {
      color: #888;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .query-form button {
      padding: 0.65rem 1.2rem;
      background: #e8a020;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .query-form button:hover:not(:disabled) {
      background: #f0b030;
    }

    .query-form button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loader {
      display: none;
      margin-top: 2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: #999;
      font-size: 0.875rem;
    }

    .loader.hidden { display: none; }

    .loader-dots {
      display: flex;
      gap: 4px;
    }

    .loader-dots span {
      width: 5px;
      height: 5px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .results {
      margin-top: 2rem;
      display: none;
    }

    .results.visible { display: block; }

    .answer-block {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 1.25rem 1.4rem;
      line-height: 1.65;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .sources-heading {
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
    }

    .sources-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .source-chip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.3rem 0.6rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 0.5rem 0.8rem;
      font-size: 0.8rem;
      color: #888;
    }

    .source-badge {
      margin-left: auto;
      font-size: 0.68rem;
      color: #888;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 0.1rem 0.35rem;
      white-space: nowrap;
    }

    .source-chip .game {
      color: #ccc;
      font-weight: 600;
    }

    .source-chip .sep {
      color: #888;
    }

    a.source-chip {
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    a.source-chip:hover {
      border-color: #555;
    }

    .error-block {
      margin-top: 2rem;
      padding: 0.9rem 1.1rem;
      background: #1e0a0a;
      border: 1px solid #4a1a1a;
      border-radius: 6px;
      color: #e06060;
      font-size: 0.875rem;
      display: none;
    }

    .error-block.visible { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="https://pinguide.info" style="color:inherit;text-decoration:none;">Pinguide</a></h1>
      <p>Ask anything about a specific pinball machine — rules, modes, scoring, and strategy. Answers are sourced from real rulesheets and strategy guides across hundreds of machines and powered by AI.</p>
      <hr>
      <p id="machineCount" style="margin-top:0.4rem;font-size:0.75rem;color:#888;font-style:italic;"></p>
    </header>

    <form class="query-form" id="queryForm">
      <label class="sr-only" for="questionInput">Your question</label>
      <input
        type="text"
        id="questionInput"
        placeholder="e.g. How does multiball work in Metallica?"
        autocomplete="off"
        autofocus
      >
      <button type="submit" id="submitBtn">Ask</button>
    </form>

    <div class="loader hidden" id="loader">
      <div class="loader-dots">
        <span></span><span></span><span></span>
      </div>
      Thinking…
    </div>

    <div class="error-block" id="errorBlock"></div>

    <div class="results" id="results">
      <div class="answer-block" id="answerBlock"></div>
      <div id="sourcesSection">
        <div class="sources-heading">Sources</div>
        <div class="sources-list" id="sourcesList"></div>
      </div>
    </div>
  </div>

  <script>
    fetch('/stats').then(r => r.json()).then(d => {
      if (d.machines) document.getElementById('machineCount').textContent = `${d.machines} machines served`;
    }).catch(() => {});

    const form = document.getElementById('queryForm');
    const input = document.getElementById('questionInput');
    const submitBtn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    const results = document.getElementById('results');
    const answerBlock = document.getElementById('answerBlock');
    const sourcesList = document.getElementById('sourcesList');
    const sourcesSection = document.getElementById('sourcesSection');
    const errorBlock = document.getElementById('errorBlock');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;

      // Reset state
      results.classList.remove('visible');
      errorBlock.classList.remove('visible');
      errorBlock.textContent = '';
      answerBlock.textContent = '';
      sourcesList.innerHTML = '';
      loader.classList.remove('hidden');
      submitBtn.disabled = true;

      try {
        const res = await fetch('/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });

        if (!res.ok) {
          throw new Error(`Server error: ${res.status} ${res.statusText}`);
        }

        const data = await res.json();

        answerBlock.textContent = data.answer ?? '(no answer returned)';

        const sources = data.sources ?? [];
        if (sources.length > 0) {
          sourcesSection.style.display = '';

          // Deduplicate by game+section_name, cap at 5
          const seen = new Set();
          const deduped = [];
          for (const src of sources) {
            const key = `${src.game}|${src.section_name}`;
            if (!seen.has(key)) {
              seen.add(key);
              deduped.push(src);
            }
            if (deduped.length === 10) break;
          }

          for (const src of deduped) {
            const chip = document.createElement(src.url ? 'a' : 'div');
            chip.className = 'source-chip';
            if (src.url) {
              chip.href = src.url;
              chip.target = '_blank';
              chip.rel = 'noopener noreferrer';
            }

            let section = (src.section_name || '').replace(/:\s*$/, '').trim();
            if (section === 'Machine Metadata') section = 'Machine Info';
            const parts = [`<span class="game">${esc(src.game)}</span>`];
            if (section) parts.push(`<span>${esc(section)}</span>`);

            chip.innerHTML = parts.join('<span class="sep" aria-hidden="true">—</span>');

            const label = sourceLabel(src.url);
            if (label) {
              const badge = document.createElement('span');
              badge.className = 'source-badge';
              badge.textContent = label;
              chip.appendChild(badge);
            }

            sourcesList.appendChild(chip);
          }
        } else {
          sourcesSection.style.display = 'none';
        }

        results.classList.add('visible');
      } catch (err) {
        errorBlock.textContent = err.message || 'Something went wrong. Is the API running?';
        errorBlock.classList.add('visible');
      } finally {
        loader.classList.add('hidden');
        submitBtn.disabled = false;
      }
    });

    function esc(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function sourceLabel(url) {
      if (!url) return 'OPDB';
      if (url.includes('tiltforums.com')) return 'Tiltforums ↗';
      if (url.includes('pinball.org')) return 'PAPA ↗';
      if (url.includes('silverballmania.com')) return "Bob's Guide ↗";
      return '↗';
    }
  </script>
</body>
</html>
